name: Supabase DB Push

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/schema.sql"
      - ".github/workflows/supabase-db-push.yml"
  workflow_dispatch:

concurrency:
  group: supabase-db-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  db-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref "$PROJECT_REF"
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Migrations
        run: supabase db push --password "$DB_PASSWORD"
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
